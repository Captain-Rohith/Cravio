spring.application.name=Cravio

server.port=8080

spring.datasource.url=${CRAVIO_DB_URL:jdbc:oracle:thin:@localhost:1521/FREEPDB1}
spring.datasource.username=${CRAVIO_DB_USERNAME:cravio}
spring.datasource.password=${CRAVIO_DB_PASSWORD:cravio}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.data.redis.host=${CRAVIO_REDIS_HOST:localhost}
spring.data.redis.port=${CRAVIO_REDIS_PORT:6379}
spring.cache.type=redis
spring.cache.redis.time-to-live=300000

cravio.jwt.secret=${CRAVIO_JWT_SECRET:change-this-secret-change-this-secret-change-this-secret}
cravio.jwt.expiration-millis=${CRAVIO_JWT_EXPIRATION:3600000}
cravio.h3.resolution=${CRAVIO_H3_RESOLUTION:9}
cravio.tracking.base-url=${CRAVIO_TRACKING_BASE_URL:http://localhost:8081}
cravio.tracking.max-attempts=${CRAVIO_TRACKING_MAX_ATTEMPTS:3}

management.endpoints.web.exposure.include=health,info

springdoc.api-docs.path=/api/v1/docs
springdoc.swagger-ui.path=/swagger-ui.html

